receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlphttp/dynatrace:
    endpoint: "${DT_ENDPOINT}"
    headers:
      Authorization: "Api-Token ${DT_API_TOKEN}"

service:
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [otlphttp/dynatrace]

    traces:
      receivers: [otlp]
      exporters: [otlphttp/dynatrace]

    metrics:
      receivers: [otlp]
      exporters: [otlphttp/dynatrace]

  telemetry:
    logs:
      level: debug
    metrics:
      level: detailed
    traces:
      level: detailed
